name: jarvis_desktop_agent
description: "Jarvis Desktop Agent - AI-powered personal assistant with social media integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # AI & Networking
  web_socket_channel: ^2.4.4
  dio: ^5.4.1
  http: ^1.2.1

  # Memory & Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.2
  path: ^1.9.0

  # Voice
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.3

  # System
  system_info2: ^3.0.0
  system_tray: ^2.0.3
  window_manager: ^0.3.7
  permission_handler: ^11.3.0

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Social Media
  share_plus: ^7.0.0

  # Utilities
  uuid: ^3.0.7
  logger: ^2.0.2
  intl: ^0.19.0
  collection: ^1.18.0
  async: ^2.11.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/scripts/macos/
    - assets/scripts/windows/
