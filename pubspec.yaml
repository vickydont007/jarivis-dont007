name: jarvis_desktop_agent
description: Cross-platform Jarvis desktop agent for Windows + macOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # System tray (background running)
  system_tray: ^2.0.3
  window_manager: ^0.3.7

  # State management
  provider: ^6.1.1
  riverpod: ^2.5.1
  flutter_riverpod: ^2.4.9

  # Networking
  web_socket_channel: ^2.4.4
  http: ^1.2.1
  dio: ^5.4.1

  # File system
  path_provider: ^2.1.2
  path: ^1.9.0
  watcher: ^1.1.0

  # System info
  system_info2: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^17.2.1

  # Screenshot
  screenshot: ^3.0.0

  # Utility
  uuid: ^4.3.3
  json_annotation: ^4.8.1
  logger: ^2.0.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  async: ^2.11.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/scripts/windows/
    - assets/scripts/macos/
